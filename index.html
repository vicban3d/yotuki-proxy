<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <!--
    This file must be hosted on a real HTTPS domain (GitHub Pages, Netlify, Vercel, etc.)
    so that YouTube receives a valid HTTP Referer and does not block playback (error 153).

    Deployment (GitHub Pages – free):
      1. Create a new public GitHub repo, e.g. "yt-proxy"
      2. Copy this file as index.html into that repo
      3. Enable GitHub Pages (Settings → Pages → Deploy from main branch / root)
      4. Your proxy URL will be: https://<username>.github.io/yt-proxy/
      5. Set PROXY_BASE_URL in src/components/VideoPlayer.tsx to that URL
  -->
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    #player { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="player"></div>
  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    var player;
    var videoId = new URLSearchParams(location.search).get('v') || '';
    var startTime = parseInt(new URLSearchParams(location.search).get('start') || '0');
    
    function onYouTubeIframeAPIReady() {
      if (!/^[A-Za-z0-9_-]{11}$/.test(videoId)) {
        return;
      }
      
      player = new YT.Player('player', {
        width: '100%',
        height: '100%',
        videoId: videoId,
        playerVars: {
          autoplay: 1,
          controls: 1,
          rel: 0,
          playsinline: 1,
          start: startTime
        },
        events: {
          'onStateChange': onPlayerStateChange,
          'onReady': onPlayerReady
        }
      });
    }
    
    function onPlayerReady(event) {
      // Auto-play on ready
      event.target.playVideo();
    }
    
    function onPlayerStateChange(event) {
      // Optional: emit state changes to parent
      if (window.parent !== window) {
        window.parent.postMessage({
          type: 'playerStateChange',
          state: event.data,
          currentTime: player ? player.getCurrentTime() : 0
        }, '*');
      }
    }
    
    // Listen for requests from parent app
    window.addEventListener('message', function(event) {
      if (event.data.type === 'getPlaybackTime' && player) {
        var currentTime = player.getCurrentTime();
        var duration = player.getDuration();
        window.parent.postMessage({
          type: 'playbackTime',
          currentTime: currentTime,
          duration: duration
        }, '*');
      }
    });
    
    // If YouTube API is already loaded, call the ready function
    if (typeof YT !== 'undefined' && YT.Player) {
      onYouTubeIframeAPIReady();
    }
  </script>
</body>
</html>
